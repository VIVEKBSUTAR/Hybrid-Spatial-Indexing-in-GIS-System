<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniGIS 3D — Engine Visualization</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #050a1a 0%, #0f1835 100%);
            color: #e5e7eb;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
            gap: 0;
            overflow: hidden;  
        }

        .sidebar {
            width: 350px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;

            overflow-y: auto;     
            overflow-x: hidden; 

            height: 100vh;        
            border-right: 1px solid rgba(99, 102, 241, 0.2);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .server-health {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .server-health.offline {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .tab-bar {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap; 
        }

        .tab-button {
            padding: 8px 16px;
            border-radius: 24px;
            border: none;
            background: rgba(99, 102, 241, 0.1);
            color: #a0aec0;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-button:hover {
            background: rgba(99, 102, 241, 0.2);
        }

        .tab-button.active {
            background: #6366f1;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .tab-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a0aec0;
            margin: 16px 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
        }

        .button {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
        }

        .button-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .button-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .button-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .button-danger:hover {
            transform: scale(1.02);
        }

        .button-secondary {
            background: rgba(99, 102, 241, 0.1);
            color: #c7d2fe;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .button-secondary:hover {
            background: rgba(99, 102, 241, 0.2);
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input[type="number"], input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #e5e7eb;
            font-size: 13px;
        }

        input[type="number"]:focus, input[type="text"]:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid #6366f1;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 11px;
            color: #a0aec0;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #6366f1;
        }

        .canvas-container {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }

        canvas {
            background: #0d1117;
            border-radius: 8px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            flex: 1;
        }

        .mini-map {
            position: absolute;
            right: 32px;
            bottom: 32px;
            width: 100px;
            height: 100px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 4px;
            background: rgba(13, 17, 23, 0.8);
        }

        .log-panel {
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 6px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 120px;
            overflow-y: auto;
            min-height: 60px;
        }

        .log-line {
            margin: 2px 0;
            color: #d1d5db;
        }

        .log-line.range { color: #6366f1; }
        .log-line.nn { color: #10b981; }
        .log-line.knn { color: #f59e0b; }
        .log-line.error { color: #ef4444; }

        .mode-indicator {
            padding: 8px 12px;
            background: rgba(99, 102, 241, 0.2);
            border-left: 3px solid #6366f1;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 12px;
        }

        #three-container {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .z-slider-container {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            margin-bottom: 12px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(99, 102, 241, 0.2);
            outline: none;
            accent-color: #6366f1;
        }

        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; max-height: 200px; }
            .main-content { flex: 1; }
            .canvas-container { padding: 12px; }
        }

        /* F5: Performance badge styling */
        .perf-badge {
            display: inline-block;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            margin-left: 8px;
        }

        * {
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="header">
                <div class="header-logo">◆ MiniGIS 3D</div>
                <div class="server-health" id="health-indicator"></div>
            </div>

            <div class="tab-bar">
                <button class="tab-button active" onclick="switchTab(this, 'dataset')">Dataset</button>
                <button class="tab-button" onclick="switchTab(this, 'query')">Query</button>
                <button class="tab-button" onclick="switchTab(this, 'compare')">Compare</button>
                <button class="tab-button" onclick="switchTab(this, 'stats')">Stats</button>
                <button class="tab-button" onclick="switchTab(this, '3d')">3D View</button>
            </div>

            <!-- DATASET TAB -->
            <div id="dataset" class="tab-content active">
                <div class="section-title">Generate Data</div>
                <div class="input-group">
                    <input type="number" id="gen-count" value="10000" min="100" max="100000">
                </div>
                <button class="button button-primary" onclick="generateFromC()">⚡ Generate</button>
                <button class="button button-secondary" onclick="clearData()" style="margin-top: 8px;">🗑️ Clear All</button>
                
                <div class="section-title">Index Statistics</div>
                <button class="button button-secondary" onclick="loadStats()">📊 Show Stats</button>
                <div id="stats-display" style="margin-top: 12px;"></div>
            </div>

            <!-- QUERY TAB -->
            <div id="query" class="tab-content">
                <div class="section-title">Query Mode</div>
                <div id="mode-indicator" class="mode-indicator">📍 Select a mode</div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
                    <button class="button button-secondary" id="btn-range" onclick="setMode('range')">Range</button>
                    <button class="button button-secondary" id="btn-nn" onclick="setMode('nn')">NN</button>
                    <button class="button button-secondary" id="btn-knn" onclick="setMode('knn')">KNN</button>
                </div>

                <div class="section-title">Range Query (3D)</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
                    <input type="number" id="range-minx" value="0" placeholder="minX">
                    <input type="number" id="range-maxx" value="500" placeholder="maxX">
                    <input type="number" id="range-miny" value="0" placeholder="minY">
                    <input type="number" id="range-maxy" value="500" placeholder="maxY">
                    <input type="number" id="range-minz" value="0" placeholder="minZ">
                    <input type="number" id="range-maxz" value="500" placeholder="maxZ">
                </div>
                <button class="button button-primary" onclick="rangeQueryManual()">🔍 Execute Range</button>

                <div class="section-title">NN / KNN (3D)</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
                    <input type="number" id="query-x" value="250" placeholder="X">
                    <input type="number" id="query-y" value="250" placeholder="Y">
                    <input type="number" id="query-z" value="250" placeholder="Z">
                    <input type="number" id="knn-k" value="5" min="1" max="100" placeholder="K">
                </div>
                <button class="button button-primary" onclick="nnQuery()" style="margin-bottom: 8px;">⭐ Find NN</button>
                <button class="button button-primary" onclick="knnQuery()">🌟 Find K-NN</button>
            </div>

            <!-- COMPARE TAB -->
            <div id="compare" class="tab-content">
                <div class="section-title">Performance Metrics</div>
                <button class="button button-secondary" onclick="benchmarkQueries()">📈 Run Benchmark</button>
                <div id="benchmark-result" style="margin-top: 12px;"></div>
            </div>

            <!-- STATS TAB -->
            <div id="stats" class="tab-content">
                <div class="section-title">Engine Statistics</div>
                <div id="stats-panel"></div>
            </div>

            <!-- 3D VIEW TAB -->
            <div id="3d" class="tab-content" style="padding: 0; display: flex; flex-direction: column;">
                <div class="z-slider-container">
                    <div style="font-size: 12px; margin-bottom: 8px; color: #a0aec0;">Z-Slice: <span id="z-value">500</span></div>
                    <input type="range" id="z-slice" min="0" max="1000" value="500" step="10" 
                        oninput="updateZSlice(this.value)">
                </div>
                <div id="three-container" style="flex: 1; padding: 0 20px 20px 20px;"></div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="font-size: 20px;">🗺️</div>
                    <div>
                        <div style="font-size: 18px; font-weight: 600;">MiniGIS 3D Engine</div>
                        <div style="font-size: 12px; color: #a0aec0;">Octree Spatial Index | 3D Point Cloud</div>
                    </div>
                </div>
                <div style="font-size: 12px; color: #a0aec0;">Keyboard: I/R/N/K = modes | Esc = cancel</div>
            </div>

            <div class="canvas-container">
                <div style="display: flex; gap: 12px; height: 100%;">
                    <div style="flex: 1; display: flex; flex-direction: column;">
                        <canvas id="gis-canvas" width="800" height="600"></canvas>
                        <canvas id="mini-canvas" class="mini-map"></canvas>
                        <div class="log-panel">
                            <div id="log-output"></div>
                        </div>
                    </div>
                    <div style="width: 300px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 16px; overflow-y: auto;">
                        <canvas id="chart-canvas" style="max-width: 100%;"></canvas>
                        <div id="chart-container" style="max-width: 100%;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // GLOBAL STATE
        // ═══════════════════════════════════════════════════════════════════════
        
        const STATE = {
            mode: null,
            allObjects: [],
            rangeResults: [],
            nnResult: null,
            knnResults: [],
            dragStart: null,
            dragEnd: null,
            rangeBox: null,
            benchmarkData: [],
            threeScene: null,
            threeRenderer: null,
            threeCamera: null,
            threeControls: null,
            threeAnimationId: null,
            threePointsMesh: null,
            threePointsMaterial: null,
            // F3: Typed arrays for point data
            positions: new Float32Array(0),
            pointCount: 0,
            zSliceVal: 500,
            // F1: Dirty flag system
            canvasDirty: true,
            animFrameId: null,
            isDragging: false
        };

        const COLORS = {
            bg: '#0d1117',
            primary: '#6366f1',
            success: '#10b981',
            warning: '#f59e0b',
            danger: '#ef4444',
            accent: '#a855f7',
            border: 'rgba(99, 102, 241, 0.2)'
        };

        const WORLD_SIZE = 1000;
        const SERVER = 'http://localhost:8000';

        // ═══════════════════════════════════════════════════════════════════════
        // UTILITY FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function log(msg, type = 'info') {
            const logEl = document.getElementById('log-output');
            const line = document.createElement('div');
            const icons = { range: '🔵', nn: '⭐', knn: '🌟', error: '❌', info: 'ℹ️' };
            line.className = `log-line ${type}`;
            line.textContent = `${icons[type] || ''} ${msg}`;
            logEl.insertBefore(line, logEl.firstChild);
            while (logEl.children.length > 8) logEl.removeChild(logEl.lastChild);
        }

        function switchTab(btn, tabId) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            btn.classList.add('active');
            document.getElementById(tabId).classList.add('active');

            if (tabId === '3d') {
                startThreeJS();
                loadOctree();

                // 🔥 ADD THIS BLOCK
                setTimeout(() => {
                    if (STATE.rangeBox) {
                        drawRangeBox3D();
                    }
                }, 100);

            } else {
                // STOP 3D rendering
                if (STATE.threeAnimationId) {
                    cancelAnimationFrame(STATE.threeAnimationId);
                    STATE.threeAnimationId = null;
                }

                // CLEAR 3D canvas
                const container = document.getElementById('three-container');
                container.innerHTML = '';

                STATE.threeScene = null;
                STATE.threeRenderer = null;
                STATE.threeCamera = null;
                STATE.threeControls = null;
            }
        }

        function setMode(m) {
            STATE.mode = m;
            document.getElementById('mode-indicator').textContent = {
                range: '🔵 Range Query (drag on canvas)',
                nn: '⭐ Nearest Neighbour (click)',
                knn: '🌟 K-Nearest Neighbours (click)'
            }[m] || m;
        }

        let zSliceDebounceTimer = null;

        function updateZSlice(val) {
            document.getElementById('z-value').textContent = val;
            // F6: Debounce Z-slice updates (40ms)
            if (zSliceDebounceTimer) clearTimeout(zSliceDebounceTimer);
            zSliceDebounceTimer = setTimeout(() => {
                STATE.zSliceVal = parseInt(val);
                markDirty();
            }, 40);
        }

        // F1: Dirty flag + on-demand rendering
        function markDirty() {
            STATE.canvasDirty = true;
            if (STATE.animFrameId === null) {
                STATE.animFrameId = requestAnimationFrame(() => {
                    STATE.animFrameId = null;
                    if (STATE.canvasDirty) {
                        STATE.canvasDirty = false;
                        redrawCanvas();
                    }
                });
            }
        }

        // F8: ResizeObserver for canvas sizing (stop frame buffer invalidation)
        function initializeCanvasResize() {
            const container = document.querySelector('.canvas-container');
            const resizeObserver = new ResizeObserver(() => {
                markDirty();
            });
            resizeObserver.observe(container);
        }



        async function checkServerHealth() {
            try {
                await fetch(`${SERVER}/stats`, { method: 'POST', body: JSON.stringify({}) });
                document.getElementById('health-indicator').classList.remove('offline');
            } catch {
                document.getElementById('health-indicator').classList.add('offline');
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // CORE API FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        async function generateFromC() {
            const n = parseInt(document.getElementById('gen-count').value) || 10000;
            log(`Generating ${n} points...`, 'info');
            try {
                const res = await fetch(`${SERVER}/generate`, {
                    method: 'POST',
                    body: JSON.stringify({ n })
                });
                const data = await res.json();
                log(`Generated ${n} points ✓`, 'info');
                await loadAllPoints();
            } catch (e) {
                log(`Error: ${e.message}`, 'error');
            }
        }

        async function loadAllPoints() {
            try {
                const res = await fetch(`${SERVER}/sample`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ n: 5000 })
                });
                const data = await res.json();
                STATE.allObjects = data.points || [];
                
                // F3: Populate typed array for faster iteration
                STATE.positions = new Float32Array(STATE.allObjects.length * 3);
                STATE.pointCount = STATE.allObjects.length;
                for (let i = 0; i < STATE.allObjects.length; i++) {
                    const p = STATE.allObjects[i];
                    STATE.positions[i * 3]     = p.x || 0;
                    STATE.positions[i * 3 + 1] = p.y || 0;
                    STATE.positions[i * 3 + 2] = p.z || 0;
                }
                
                // F9: Rebuild Three.js point cloud if scene exists
                if (STATE.threeScene) {
                    rebuildThreePoints();
                }
                
                markDirty();
                redrawMiniMap();
                log(`Loaded ${STATE.allObjects.length} points (sampled)`, 'info');
            } catch (e) {
                log(`Load error: ${e.message}`, 'error');
            }
        }

        async function clearData() {
            try {
                await fetch(`${SERVER}/clear`, { method: 'POST', body: '{}' });
                STATE.allObjects = [];
                STATE.positions = new Float32Array(0);
                STATE.pointCount = 0;
                markDirty();
                log('Cleared all data', 'info');
            } catch (e) {
                log(`Clear error: ${e.message}`, 'error');
            }
        }

        async function loadStats() {
            try {
                const res = await fetch(`${SERVER}/stats`, { method: 'POST', body: '{}' });
                const data = await res.json();
                const html = `
                    <div class="stat-card">
                        <div class="stat-label">Total Nodes</div>
                        <div class="stat-value">${data.total_nodes}</div>
                    </div>
                    <div class="stat-card" style="border-left-color: #10b981;">
                        <div class="stat-label">Max Depth</div>
                        <div class="stat-value">${data.max_depth}</div>
                    </div>
                    <div class="stat-card" style="border-left-color: #f59e0b;">
                        <div class="stat-label">Total Objects</div>
                        <div class="stat-value">${data.total_objects}</div>
                    </div>
                `;
                document.getElementById('stats-display').innerHTML = html;
                document.getElementById('stats-panel').innerHTML = html;
            } catch (e) {
                log(`Stats error: ${e.message}`, 'error');
            }
        }

        async function rangeQueryManual() {
            const box = {   
                minX: parseFloat(document.getElementById('range-minx').value),
                minY: parseFloat(document.getElementById('range-miny').value),
                minZ: parseFloat(document.getElementById('range-minz').value),
                maxX: parseFloat(document.getElementById('range-maxx').value),
                maxY: parseFloat(document.getElementById('range-maxy').value),
                maxZ: parseFloat(document.getElementById('range-maxz').value)
            };

            STATE.rangeBox = box; 
            
            STATE.rangeResults = [];
            STATE.nnResult = null;
            STATE.knnResults = [];

            try {
                const res = await fetch(`${SERVER}/range`, {
                    method: 'POST',
                    body: JSON.stringify({ box })
                });
                const data = await res.json();
                console.log("SERVER RESPONSE:", data);
                STATE.rangeResults = data.points || [];
                if (STATE.threeScene) {
                    rebuildThreePoints();
                    drawRangeBox3D();
                }
                log(`Range query: ${data.result_count} results, ${data.visited_nodes} nodes`, 'range');
                markDirty();
            } catch (e) {
                log(`Query error: ${e.message}`, 'error');
            }
        }

        async function nnQuery() {
            const x = parseFloat(document.getElementById('query-x').value);
            const y = parseFloat(document.getElementById('query-y').value);
            const z = parseFloat(document.getElementById('query-z').value);
            
            STATE.rangeResults = [];
            STATE.knnResults = [];
            STATE.nnResult = null;

            try {
                const res = await fetch(`${SERVER}/nn`, {
                    method: 'POST',
                    body: JSON.stringify({ x, y, z })
                });
                const data = await res.json();
                console.log("SERVER RESPONSE:", data);
                STATE.nnResult = data.point;
                log(`NN found at distance ≈ ${data.visited_nodes === undefined ? '?' : 'calculated'}`, 'nn');
                markDirty();
            } catch (e) {
                log(`NN error: ${e.message}`, 'error');
            }
        }

        async function knnQuery() {
            const x = parseFloat(document.getElementById('query-x').value);
            const y = parseFloat(document.getElementById('query-y').value);
            const z = parseFloat(document.getElementById('query-z').value);
            const k = parseInt(document.getElementById('knn-k').value);

            STATE.rangeResults = [];
            STATE.nnResult = null;
            STATE.knnResults = [];

            try {
                const res = await fetch(`${SERVER}/knn`, {
                    method: 'POST',
                    body: JSON.stringify({ x, y, z, k })
                });
                const data = await res.json();
                console.log("SERVER RESPONSE:", data);
                STATE.knnResults = data.points || [];
                log(`KNN: ${data.result_count} neighbors found`, 'knn');
                markDirty();
            } catch (e) {
                log(`KNN error: ${e.message}`, 'error');
            }
        }

        async function loadOctree() {
            try {
                const res = await fetch(`${SERVER}/dump`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });

                const data = await res.json();
                console.log("OCTREE:", data);

                STATE.octreeNodes = data.nodes || [];

                drawOctree();

            } catch (e) {
                console.error("Octree load error:", e);
            }
        }

        function drawOctree() {
            if (!STATE.threeScene) return;

            // remove old cubes
            if (STATE.octreeMeshes) {
                STATE.octreeMeshes.forEach(m => STATE.threeScene.remove(m));
            }

            STATE.octreeMeshes = [];

            STATE.octreeNodes.forEach(node => {

                const geometry = new THREE.BoxGeometry(
                    node.size * 2,
                    node.size * 2,
                    node.size * 2
                );

                const material = new THREE.MeshBasicMaterial({
                    color: 0x6366f1,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.15
                });

                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(node.x, node.y, node.z);

                STATE.threeScene.add(cube);
                STATE.octreeMeshes.push(cube);
            });
        }

        async function benchmarkQueries() {
            log('Running benchmark...', 'info');
            const results = { range: [], range_naive: [], nn: [], knn: [] };
            try {
                // Range
                const rRes = await fetch(`${SERVER}/range`, {
                    method: 'POST',
                    body: JSON.stringify({ box: { minX: 100, minY: 100, minZ: 100, maxX: 400, maxY: 400, maxZ: 400 } })
                });
                const rData = await rRes.json();
                results.range = [rData.result_count, rData.visited_nodes, parseFloat(rData.time_ms)];

                // Range Naive
                const rnRes = await fetch(`${SERVER}/range_naive`, {
                    method: 'POST',
                    body: JSON.stringify({ box: { minX: 100, minY: 100, minZ: 100, maxX: 400, maxY: 400, maxZ: 400 } })
                });
                const rnData = await rnRes.json();
                results.range_naive = [rnData.result_count, rnData.visited_nodes, parseFloat(rnData.time_ms)];

                const speedup = (results.range_naive[1] / results.range[1]).toFixed(1);
                const html = `
                    <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; border-radius: 6px; padding: 12px; margin-bottom: 12px;">
                        <div style="font-size: 20px; font-weight: 700; color: #10b981; margin-bottom: 4px;">⚡ ${speedup}× faster</div>
                        <div style="font-size: 12px; color: #cbd5e1;">Indexed vs Naive</div>
                    </div>
                    <table style="width: 100%; font-size: 12px; color: #cbd5e1;">
                        <tr style="border-bottom: 1px solid rgba(99, 102, 241, 0.2); padding: 8px 0;">
                            <td style="padding: 4px;">Indexed</td>
                            <td style="text-align: right;">Results: ${results.range[0]} | Nodes: ${results.range[1]} | Time: ${results.range[2].toFixed(2)}ms</td>
                        </tr>
                        <tr style="padding: 8px 0;">
                            <td style="padding: 4px;">Naive</td>
                            <td style="text-align: right;">Results: ${results.range_naive[0]} | Nodes: ${results.range_naive[1]} | Time: ${results.range_naive[2].toFixed(2)}ms</td>
                        </tr>
                    </table>
                `;
                document.getElementById('benchmark-result').innerHTML = html;
                STATE.benchmarkData = results;
                updateChartJS();
            } catch (e) {
                log(`Benchmark error: ${e.message}`, 'error');
            }
        }

        // ═════════════════════════════════════════════════════════════════════════
        // CANVAS RENDERING (2D)
        // ═════════════════════════════════════════════════════════════════════════

        let dashOffset = 0;

        function redrawCanvas() {
            const canvas = document.getElementById('gis-canvas');
            const ctx = canvas.getContext('2d');

            const W = canvas.clientWidth  || canvas.width  || 800;
            const H = canvas.clientHeight || canvas.height || 600;

            if (canvas.width !== W || canvas.height !== H) {
                canvas.width  = W;
                canvas.height = H;
            }

            // ===== CORRECT SCALING (FIX) =====
            const scaleX = W / WORLD_SIZE;
            const scaleY = H / WORLD_SIZE;

            // Background
            ctx.fillStyle = COLORS.bg;
            ctx.fillRect(0, 0, W, H);

            // Grid
            ctx.strokeStyle = 'rgba(99, 102, 241, 0.15)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 10; i++) {
                const x = (i / 10) * W;
                const y = (i / 10) * H;

                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // Axis labels
            ctx.fillStyle = '#a0aec0';
            ctx.font = '11px Inter';
            for (let i = 0; i <= 10; i += 2) {
                const label = (i * 100).toString();
                ctx.fillText(label, (i / 10) * W - 10, H - 5);
                ctx.fillText(label, 5, (i / 10) * H + 4);
            }

            const zSlice = STATE.zSliceVal;

            // ===== POINTS (DIM) =====
            ctx.fillStyle = 'rgba(6, 182, 212, 0.2)';
            for (let i = 0; i < STATE.pointCount; i++) {
                const z = STATE.positions[i * 3 + 2];
                if (Math.abs(z - zSlice) >= 100) {
                    const x = STATE.positions[i * 3] * scaleX;
                    const y = STATE.positions[i * 3 + 1] * scaleY;
                    ctx.beginPath();
                    ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ===== POINTS (BRIGHT) =====
            ctx.fillStyle = 'rgba(6, 182, 212, 0.8)';
            ctx.strokeStyle = 'rgba(6, 182, 212, 1)';
            ctx.lineWidth = 2;
            for (let i = 0; i < STATE.pointCount; i++) {
                const z = STATE.positions[i * 3 + 2];
                if (Math.abs(z - zSlice) < 100) {
                    const x = STATE.positions[i * 3] * scaleX;
                    const y = STATE.positions[i * 3 + 1] * scaleY;
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
            }

            // ===== RANGE RESULTS =====
            STATE.rangeResults.forEach(pt => {
                const x = pt.x * scaleX;
                const y = pt.y * scaleY;

                ctx.fillStyle = '#22c55e';
                ctx.beginPath();
                ctx.arc(x, y, 7, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(x, y, 9, 0, Math.PI * 2);
                ctx.stroke();
            });

            // ===== NN RESULT =====
            if (STATE.nnResult) {
                const x = STATE.nnResult.x * scaleX;
                const y = STATE.nnResult.y * scaleY;

                ctx.fillStyle = '#00ffff';
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(x, y, 11, 0, Math.PI * 2);
                ctx.stroke();
            }

            // ===== KNN RESULTS =====
            STATE.knnResults.forEach((pt, idx) => {
                const x = pt.x * scaleX;
                const y = pt.y * scaleY;

                const color = `rgba(${168 + idx * 10}, 85, 247, 0.8)`;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, 7, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px Inter';
                ctx.textAlign = 'center';
                ctx.fillText((idx + 1).toString(), x, y + 3);
            });

            // ===== RANGE BOX =====
            if (STATE.rangeBox) {
                ctx.setLineDash([6, 3]);
                ctx.lineDashOffset = -dashOffset;
                dashOffset = (dashOffset + 1) % 9;

                ctx.strokeStyle = '#6366f1';
                ctx.lineWidth = 2;

                const x0 = STATE.rangeBox.minX * scaleX;
                const y0 = STATE.rangeBox.minY * scaleY;
                const x1 = STATE.rangeBox.maxX * scaleX;
                const y1 = STATE.rangeBox.maxY * scaleY;

                ctx.strokeRect(x0, y0, x1 - x0, y1 - y0);
                ctx.setLineDash([]);
            }

            STATE.canvasDirty = false;
        }


        function redrawMiniMap() {
            const canvas = document.getElementById('mini-canvas');
            const ctx = canvas.getContext('2d');
            const W = 100, H = 100;

            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, W, H);

            // Density heatmap
            STATE.allObjects.forEach(pt => {
                const x = (pt.x / WORLD_SIZE) * W;
                const y = (pt.y / WORLD_SIZE) * H;
                const hue = (pt.z / WORLD_SIZE) * 280 + 180; // cyan to purple
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.fillRect(x - 1, y - 1, 2, 2);
            });

            ctx.strokeStyle = 'rgba(99, 102, 241, 0.5)';
            ctx.lineWidth = 1;
            ctx.strokeRect(0, 0, W, H);
        }

        // ═════════════════════════════════════════════════════════════════════════
        // CHART.JS INTEGRATION
        // ═════════════════════════════════════════════════════════════════════════

        let chartInstance = null;

        function updateChartJS() {
            const container = document.getElementById('chart-container');
            if (!STATE.benchmarkData || Object.keys(STATE.benchmarkData).length === 0) return;

            const data = {
                labels: ['Results', 'Nodes Visited', 'Time (ms)'],
                datasets: [
                    {
                        label: '🟣 Indexed',
                        data: STATE.benchmarkData.range || [0, 0, 0],
                        backgroundColor: 'rgba(99, 102, 241, 0.6)',
                        borderColor: '#6366f1',
                        borderWidth: 1
                    },
                    {
                        label: '🔴 Naive',
                        data: STATE.benchmarkData.range_naive || [0, 0, 0],
                        backgroundColor: 'rgba(239, 68, 68, 0.6)',
                        borderColor: '#ef4444',
                        borderWidth: 1
                    }
                ]
            };

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('chart-canvas'), {
                type: 'bar',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { labels: { color: '#a0aec0', font: { family: 'Inter', size: 11 } } }
                    },
                    scales: {
                        y: { tintColor: 'rgba(99, 102, 241, 0.2)', grid: { color: 'rgba(99, 102, 241, 0.1)' }, ticks: { color: '#a0aec0' } },
                        x: { grid: { color: 'rgba(99, 102, 241, 0.1)' }, ticks: { color: '#a0aec0' } }
                    }
                }
            });
        }

        // ═════════════════════════════════════════════════════════════════════════
        // THREE.JS 3D VIEWER
        // ═════════════════════════════════════════════════════════════════════════
        function drawRangeBox3D() {
            if (!STATE.rangeBox || !STATE.threeScene) return;

            if (STATE.rangeMesh) {
                STATE.threeScene.remove(STATE.rangeMesh);
            }

            const box = STATE.rangeBox;

            const width  = box.maxX - box.minX;
            const height = box.maxY - box.minY;
            const depth  = box.maxZ - box.minZ;

            const geometry = new THREE.BoxGeometry(width, height, depth);
            const edges = new THREE.EdgesGeometry(geometry);

            const material = new THREE.LineBasicMaterial({
                color: 0xffff00,
                depthTest: false   // 🔥 KEY FIX
            });

            const wireframe = new THREE.LineSegments(edges, material);

            wireframe.position.set(
                (box.minX + box.maxX) / 2,
                (box.minY + box.maxY) / 2,
                (box.minZ + box.maxZ) / 2
            );

            wireframe.renderOrder = 999;      // 🔥 force on top
            wireframe.scale.set(1.01, 1.01, 1.01); // 🔥 avoid overlap

            STATE.threeScene.add(wireframe);
            STATE.rangeMesh = wireframe;
        }

        async function startThreeJS() {
            if (STATE.threeScene) return;

            const container = document.getElementById('three-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            // Scene setup
            STATE.threeScene = new THREE.Scene();
            STATE.threeScene.background = new THREE.Color(0x0d1117);

            STATE.threeRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            STATE.threeRenderer.setSize(width, height);
            container.appendChild(STATE.threeRenderer.domElement);

            STATE.threeCamera = new THREE.PerspectiveCamera(60, width / height, 0.1, 10000);
            STATE.threeCamera.position.set(500, 500, 2000);
            STATE.threeCamera.lookAt(500, 500, 500);

            // Lights
            const ambLight = new THREE.AmbientLight(0xffffff, 0.5);
            STATE.threeScene.add(ambLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(1000, 1000, 1000);
            STATE.threeScene.add(dirLight);

            // Orbit controls
            STATE.threeControls = new THREE.OrbitControls(
            STATE.threeCamera,
            STATE.threeRenderer.domElement
            );
            STATE.threeControls.target.set(500, 500, 500);
            STATE.threeControls.update();

            // F9: Point material with sizeAttenuation
            STATE.threePointsMaterial = new THREE.PointsMaterial({
                size: 3,
                vertexColors: true,
                sizeAttenuation: true
            });

            // F9: Store point mesh for later rebuild
            rebuildThreePoints();

            // F4: Merge all grid lines into single geometry
            const gridGeometry = new THREE.BufferGeometry();
            const gridPositions = [];
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    for (let k = 0; k < 10; k++) {
                        const x0 = i * 100, y0 = j * 100, z0 = k * 100;
                        const x1 = x0 + 100, y1 = y0 + 100, z1 = z0 + 100;
                        // Box edges (8 vertices, 12 edges)
                        const verts = [
                            [x0, y0, z0], [x1, y0, z0], [x1, y1, z0], [x0, y1, z0],
                            [x0, y0, z1], [x1, y0, z1], [x1, y1, z1], [x0, y1, z1]
                        ];
                        const edges = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
                        edges.forEach(([a,b]) => {
                            gridPositions.push(verts[a][0], verts[a][1], verts[a][2]);
                            gridPositions.push(verts[b][0], verts[b][1], verts[b][2]);
                        });
                    }
                }
            }
            gridGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(gridPositions), 3));
            const gridMaterial = new THREE.LineBasicMaterial({ color: 0x6366f1, transparent: true, opacity: 0.1 });
            const gridLines = new THREE.LineSegments(gridGeometry, gridMaterial);
            STATE.threeScene.add(gridLines);

            // F10: Pause renderer when tab is hidden
            document.addEventListener('visibilitychange', () => {
                if (STATE.threeAnimationId === null) return;
                if (document.hidden) {
                    cancelAnimationFrame(STATE.threeAnimationId);
                    STATE.threeAnimationId = null;
                } else {
                    animateThreeJS();
                }
            });

            animateThreeJS();
        }

        // F9: Rebuild point cloud when data changes
        function rebuildThreePoints() {
            // Remove old points mesh
            if (STATE.threePointsMesh) {
                STATE.threeScene.remove(STATE.threePointsMesh);
                STATE.threePointsMesh.geometry.dispose();
            }
            
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            STATE.allObjects.forEach(pt => {
                positions.push(pt.x, pt.y, pt.z);

                let isInRange = false;

                if (STATE.rangeBox) {
                    const b = STATE.rangeBox;
                    isInRange =
                        pt.x >= b.minX && pt.x <= b.maxX &&
                        pt.y >= b.minY && pt.y <= b.maxY &&
                        pt.z >= b.minZ && pt.z <= b.maxZ;
                }

                if (isInRange) {
                    colors.push(0, 1, 0); // green
                } else {
                    const z_norm = pt.z / 1000;
                    const hue = 180 + z_norm * 100;
                    const rgb = hslToRgb(hue / 360, 1, 0.5);
                    colors.push(rgb[0] / 255, rgb[1] / 255, rgb[2] / 255);
                }
            });
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
            
            STATE.threePointsMesh = new THREE.Points(geometry, STATE.threePointsMaterial);
            STATE.threeScene.add(STATE.threePointsMesh);
        }

        // F10: Separate animation loop function
        function animateThreeJS() {
            STATE.threeAnimationId = requestAnimationFrame(animateThreeJS);
            STATE.threeControls.update();
            STATE.threeRenderer.render(STATE.threeScene, STATE.threeCamera);
        }


        function hslToRgb(h, s, l) {
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const x = c * (1 - Math.abs((h * 6) % 2 - 1));
            const m = l - c / 2;
            let r = 0, g = 0, b = 0;
            if (h < 1/6) { r = c; g = x; } else if (h < 2/6) { r = x; g = c; } else if (h < 3/6) { g = c; b = x; } else if (h < 4/6) { g = x; b = c; } else if (h < 5/6) { r = x; b = c; } else { r = c; b = x; }
            return [(r + m) * 255, (g + m) * 255, (b + m) * 255];
        }

        // ═════════════════════════════════════════════════════════════════════════
        // EVENT LISTENERS & INITIALIZATION
        // ═════════════════════════════════════════════════════════════════════════

        document.getElementById('gis-canvas').addEventListener('mousedown', (e) => {
            STATE.isDragging = true;
            if (STATE.mode !== 'range') {
                if (STATE.mode === 'nn' || STATE.mode === 'knn') {
                    const rect = e.target.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width * WORLD_SIZE;
                    const y = (e.clientY - rect.top) / rect.height * WORLD_SIZE;
                    document.getElementById('query-x').value = x.toFixed(1);
                    document.getElementById('query-y').value = y.toFixed(1);
                    document.getElementById('query-z').value = STATE.zSliceVal;
                }
                return;
            }
            const rect = e.target.getBoundingClientRect();
            STATE.dragStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        });

        document.getElementById('gis-canvas').addEventListener('mousemove', (e) => {
            if (!STATE.dragStart) return;
            const rect = e.target.getBoundingClientRect();
            STATE.dragEnd = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            STATE.rangeBox = {
                minX: (Math.min(STATE.dragStart.x, STATE.dragEnd.x) / rect.width) * WORLD_SIZE,
                maxX: (Math.max(STATE.dragStart.x, STATE.dragEnd.x) / rect.width) * WORLD_SIZE,
                minY: (Math.min(STATE.dragStart.y, STATE.dragEnd.y) / rect.height) * WORLD_SIZE,
                maxY: (Math.max(STATE.dragStart.y, STATE.dragEnd.y) / rect.height) * WORLD_SIZE,
                minZ: STATE.zSliceVal - 50,
                maxZ: STATE.zSliceVal + 50
            };
            console.log(STATE.rangeBox);
            markDirty();
        });

        document.getElementById('gis-canvas').addEventListener('mouseup', () => {
            STATE.isDragging = false;
            if (STATE.rangeBox) {
                document.getElementById('range-minx').value = STATE.rangeBox.minX.toFixed(1);
                document.getElementById('range-maxx').value = STATE.rangeBox.maxX.toFixed(1);
                document.getElementById('range-miny').value = STATE.rangeBox.minY.toFixed(1);
                document.getElementById('range-maxy').value = STATE.rangeBox.maxY.toFixed(1);
                rangeQueryManual();
            }
            STATE.dragStart = null;
            STATE.dragEnd = null;
        });

        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'i') setMode('insert');
            if (e.key.toLowerCase() === 'r') setMode('range');
            if (e.key.toLowerCase() === 'n') setMode('nn');
            if (e.key.toLowerCase() === 'k') setMode('knn');
            if (e.key === 'Escape') STATE.mode = null;
        });

        // Initialize
        window.addEventListener('load', () => {
            // Set canvas to real pixel size before first draw
            const canvas = document.getElementById('gis-canvas');
            const container = canvas.parentElement;
            canvas.width  = container.clientWidth  || 800;
            canvas.height = container.clientHeight || 600;

            checkServerHealth();
            setInterval(checkServerHealth, 5000);
            initializeCanvasResize();

            // Draw empty grid immediately so canvas isn't black on load
            redrawCanvas();

            // Then load points from server
            loadAllPoints();

            // ───── ADD THIS PART ─────

            // Auto-run range query when inputs change
            ['range-minx','range-maxx','range-miny','range-maxy','range-minz','range-maxz']
            .forEach(id => {
                document.getElementById(id).addEventListener('change', rangeQueryManual);
            });

            // Auto-run NN / KNN when inputs change
            ['query-x','query-y','query-z'].forEach(id => {
                document.getElementById(id).addEventListener('change', () => {
                    if (STATE.mode === 'nn') nnQuery();
                    if (STATE.mode === 'knn') knnQuery();
                });
            });

        });
    </script>
